<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="manifest" href="manifest.json" />
  <title>NeuroPro â€” Biblioteca de Actividades</title>
  <meta name="description" content="CatÃ¡logo completo de actividades funcionales en NeuroPro. Activa, edita y crea secuencias visuales." />
  <link rel="icon" type="image/png" href="logo.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root{--np-pink:#f43f5e;--np-pink-hover:#e11d48;--np-pink-soft:#fff1f2;--np-blue:#3b82f6;--np-blue-soft:#eff6ff;--np-purple:#a855f7;--np-green:#10b981;--np-orange:#f97316;--np-bg:#f8fafc;--np-card:#ffffff;--np-sidebar:#ffffff;--np-border:#e2e8f0;--np-text:#0f172a;--np-text-muted:#64748b;--np-shadow:0 4px 24px rgba(0,0,0,.07);}
    [data-bs-theme="dark"]{--np-bg:#090d16;--np-card:#111827;--np-sidebar:#0b111e;--np-border:#1e293b;--np-text:#f1f5f9;--np-text-muted:#94a3b8;--np-shadow:0 4px 24px rgba(0,0,0,.4);}
    body{font-family:'Inter',sans-serif;background:var(--np-bg);color:var(--np-text);transition:background .3s,color .3s;}
    ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px;}
    [data-bs-theme="dark"] ::-webkit-scrollbar-thumb{background:#1f2937;}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    .fade-in-up{animation:fadeInUp .4s ease-out both;}.delay-1{animation-delay:.08s;}.delay-2{animation-delay:.16s;}
    /* Sidebar (shared) */
    .np-sidebar{width:72px;min-height:100vh;background:var(--np-sidebar);border-right:1px solid var(--np-border);display:flex;flex-direction:column;align-items:center;padding:1.25rem .75rem;gap:0;position:fixed;top:0;left:0;z-index:200;box-shadow:2px 0 12px rgba(0,0,0,.05);user-select:none;}
    .np-sidebar *{user-select:none;}
    .np-sidebar .nav-btn{width:44px;height:44px;border-radius:14px;border:none;display:flex;align-items:center;justify-content:center;font-size:.95rem;margin-bottom:.6rem;transition:all .2s;color:var(--np-text-muted);background:transparent;position:relative;}
    .np-sidebar .nav-btn:hover{background:var(--np-pink-soft);color:var(--np-pink);transform:scale(1.08);}
    .np-sidebar .nav-btn.active{background:var(--np-pink);color:#fff;box-shadow:0 4px 12px rgba(244,63,94,.3);}
    [data-bs-theme="dark"] .np-sidebar .nav-btn:hover{background:rgba(244,63,94,.12);}
    .np-sidebar .sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:.6rem;}
    .np-sidebar .btn-theme-sb{width:38px;height:38px;border-radius:12px;border:1px solid var(--np-border);background:var(--np-card);color:var(--np-text-muted);display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer;}
    .np-sidebar .btn-theme-sb:hover{transform:scale(1.1);}
    .np-sidebar .avatar-pill{width:38px;height:38px;border-radius:12px;border:1px solid var(--np-border);background:var(--np-pink-soft);color:var(--np-pink);font-weight:800;font-size:.7rem;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;transition:all .2s;padding:0;overflow:hidden;}
    .np-sidebar .avatar-pill:hover{transform:scale(1.08);background:var(--np-pink-soft);color:var(--np-pink);}
    .np-sidebar .avatar-pill.active{background:var(--np-pink);color:#fff;box-shadow:0 4px 12px rgba(244,63,94,.3);border-color:var(--np-pink);}
    .sidebar-tooltip{position:absolute;left:56px;background:#1e293b;color:#fff;border-radius:8px;padding:.25rem .65rem;font-size:.72rem;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;z-index:300;}
    .nav-btn:hover .sidebar-tooltip{opacity:1;}
    .np-main{margin-left:72px;min-height:100vh;}
    .np-header{background:var(--np-card);border-bottom:1px solid var(--np-border);padding:.9rem 1.75rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
    .np-header-img{max-height:52px;object-fit:contain;}
    .np-card{background:var(--np-card);border:1px solid var(--np-border);border-radius:20px;box-shadow:var(--np-shadow);}
    #toast-container{position:fixed;top:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem;pointer-events:none;}
    #toast-container .toast{pointer-events:auto;}
    .np-pill{border-radius:999px;padding:.3rem .85rem;font-size:.72rem;font-weight:700;display:inline-flex;align-items:center;gap:.4rem;}
    .np-input{background:var(--np-bg);border:1.5px solid var(--np-border);border-radius:12px;padding:.6rem 1rem;font-size:.85rem;color:var(--np-text);font-family:'Inter',sans-serif;width:100%;transition:border-color .2s,box-shadow .2s;}
    .np-input:focus{outline:none;border-color:var(--np-pink);box-shadow:0 0 0 3px rgba(244,63,94,.1);}
    .np-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--np-text-muted);margin-bottom:.4rem;display:block;}
    .btn-np-save{background:linear-gradient(135deg,var(--np-pink),var(--np-purple));color:#fff;border:none;border-radius:14px;padding:.7rem 1.75rem;font-weight:800;font-size:.85rem;transition:all .2s;box-shadow:0 4px 14px rgba(244,63,94,.3);}
    .btn-np-save:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(244,63,94,.4);color:#fff;}

    /* Category pill tabs */
    .cat-tab{border-radius:999px;padding:.45rem 1.1rem;font-size:.75rem;font-weight:700;border:none;cursor:pointer;transition:all .2s;background:var(--np-card);color:var(--np-text-muted);border:1.5px solid var(--np-border);}
    .cat-tab:hover{background:var(--np-pink-soft);color:var(--np-pink);border-color:rgba(244,63,94,.3);}
    .cat-tab.active{background:var(--np-pink);color:#fff;border-color:var(--np-pink);box-shadow:0 4px 12px rgba(244,63,94,.3);}

    /* Skill cards */
    .skill-card{
      background:var(--np-card);border:2px solid var(--np-border);border-radius:20px;
      padding:1.25rem;transition:all .25s;cursor:pointer;position:relative;overflow:hidden;
    }
    .skill-card:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(0,0,0,.1);}
    .skill-card.selected{border-color:var(--np-pink);box-shadow:0 0 0 3px rgba(244,63,94,.1);}
    .skill-card .sk-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:.85rem;flex-shrink:0;}
    .skill-card .sk-name{font-size:.88rem;font-weight:800;margin-bottom:.3rem;color:var(--np-text);}
    .skill-card .sk-cat{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--np-text-muted);}
    .skill-card .sk-steps{font-size:.7rem;color:var(--np-text-muted);margin-top:.4rem;}

    /* Toggle switch */
    .np-toggle{display:flex;align-items:center;gap:.6rem;}
    .np-toggle input[type="checkbox"]{width:36px;height:20px;appearance:none;background:#cbd5e1;border-radius:999px;position:relative;cursor:pointer;transition:background .2s;outline:none;}
    .np-toggle input[type="checkbox"]:checked{background:var(--np-green);}
    .np-toggle input[type="checkbox"]::before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
    .np-toggle input[type="checkbox"]:checked::before{transform:translateX(16px);}

    /* Steps editor */
    .step-editor-card{background:var(--np-bg);border:1.5px solid var(--np-border);border-radius:14px;padding:1rem;}
    .step-number{width:28px;height:28px;border-radius:999px;background:var(--np-pink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;flex-shrink:0;}

    @media(max-width:991.98px){
      /* Disable animations so parent transforms don't create stacking contexts
         that break position:fixed on the mobile overlay */
      .fade-in-up { animation: none !important; }

      .np-sidebar{
        width:100%; min-height:auto; height:62px;
        flex-direction:row; border-right:none;
        border-top:1px solid var(--np-border);
        position:fixed; bottom:0; left:0; top:auto;
        padding:.5rem 1rem; z-index:300;
        background:var(--np-sidebar);
        box-shadow:0 -2px 12px rgba(0,0,0,.1);
        justify-content:space-around;
      }
      .np-sidebar .nav-btn{margin-bottom:0; margin-right:0; width:48px; height:48px;}
      .np-sidebar .sidebar-bottom{flex-direction:row; margin-top:0; margin-left:0; gap:.4rem;}
      .np-main{margin-left:0; padding-bottom:72px !important;}
      .sidebar-tooltip{display:none;}

      /* Hide the in-grid detail panel on mobile â€” it shows as body-level overlay */
      #skill-detail { display: none !important; }

      /* Full-screen overlay: rendered at body level, z-index above everything */
      #skill-overlay {
        display: none;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        z-index: 2000 !important;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        border-radius: 0 !important;
        margin: 0 !important;
        padding: 1.5rem 1.25rem !important;
        background: var(--np-card) !important;
        box-shadow: none !important;
        border: none !important;
      }
      #skill-overlay.open {
        display: block;
        animation: overlayIn 0.28s cubic-bezier(.4,0,.2,1) both;
      }
      @keyframes overlayIn{
        from{opacity:0;transform:translateY(24px);}
        to{opacity:1;transform:translateY(0);}
      }
      body.skill-modal-open { overflow: hidden !important; }
      body.skill-modal-open .np-sidebar { display: none !important; }
    }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div class="d-flex flex-column flex-md-row">

  <!-- Sidebar -->
  <nav class="np-sidebar">
    <button class="nav-btn" onclick="window.location.href='dashboard.html'" title="Panel"><i class="fas fa-house"></i><span class="sidebar-tooltip">Panel Principal</span></button>
    <button class="nav-btn active" title="Actividades"><i class="fas fa-list-check"></i><span class="sidebar-tooltip">Actividades</span></button>
    <button class="nav-btn" onclick="window.location.href='agenda.html'" title="Agenda"><i class="fas fa-calendar-check"></i><span class="sidebar-tooltip">Agenda de Tareas</span></button>
    <button class="nav-btn" onclick="window.location.href='indicadores.html'" title="Indicadores"><i class="fas fa-chart-line"></i><span class="sidebar-tooltip">Indicadores</span></button>
    <button class="nav-btn" onclick="window.location.href='alumno.html'" title="Vista Alumno"><i class="fas fa-child-reaching"></i><span class="sidebar-tooltip">Vista del Alumno</span></button>
    <div class="sidebar-bottom">
      <button class="btn-theme-sb border-0" onclick="NP_toggleTheme()"><i id="theme-icon" class="fas fa-moon" style="font-size:.85rem;"></i></button>
      <button class="avatar-pill" id="sidebar-avatar" onclick="window.location.href='perfil.html'" title="Configurar Perfil">CC</button>
    </div>
  </nav>

  <!-- Main -->
  <div class="np-main flex-grow-1">
    <header class="np-header">
      <img src="encabezado.png" alt="NeuroPro" class="np-header-img" />
      <div class="d-flex align-items-center gap-3">
        <span id="session-badge" class="np-pill" style="background:rgba(244,63,94,.1);color:var(--np-pink);">
          <span style="width:7px;height:7px;border-radius:50%;background:var(--np-pink);"></span> Cargandoâ€¦
        </span>
        <button id="btn-logout" onclick="NP_logout()" class="btn btn-sm fw-semibold" style="border-radius:10px;background:var(--np-pink-soft);color:var(--np-pink);border:1px solid rgba(244,63,94,.2);font-size:.75rem;display:none;">
          <i class="fas fa-right-from-bracket me-1"></i> Salir
        </button>
      </div>
    </header>

    <div class="p-4 p-md-5" style="max-width:1300px;margin:0 auto;">

      <!-- Page title -->
      <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3 mb-5 fade-in-up">
        <div>
          <div class="d-flex align-items-center gap-2 mb-1" style="color:var(--np-blue);font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;">
            <i class="fas fa-list-check"></i> Biblioteca de Actividades
          </div>
          <h2 class="fw-black mb-1" style="font-size:1.6rem;">Explorador de Actividades</h2>
          <p style="color:var(--np-text-muted);font-size:.85rem;margin:0;">Selecciona, activa, edita o crea actividades funcionales personalizadas.</p>
        </div>
        <button class="btn-np-save d-flex align-items-center gap-2" onclick="createNewSkill()" style="white-space:nowrap;">
          <i class="fas fa-plus-circle"></i> Crear Actividad
        </button>
      </div>

      <div class="row g-4">

        <!-- LEFT: Skill catalog -->
        <div class="col-lg-5 fade-in-up delay-1">
          <div class="np-card p-4">
            <!-- Search -->
            <div class="position-relative mb-3">
              <i class="fas fa-magnifying-glass position-absolute" style="left:1rem;top:50%;transform:translateY(-50%);color:var(--np-text-muted);font-size:.8rem;"></i>
              <input type="text" id="search-skill" class="np-input" placeholder="Buscar actividadâ€¦" style="padding-left:2.5rem;" oninput="filterSkills()" />
            </div>
            <!-- Category select -->
            <div class="mb-4">
              <label class="np-label" for="category-filter">Filtrar por CategorÃ­a</label>
              <select id="category-filter" class="np-input" onchange="filterCategory(this.value)">
                <option value="all">ðŸ“‚ Todas las categorÃ­as</option>
                <option value="Vida Diaria">ðŸ§¼ Vida Diaria</option>
                <option value="Rutina Escolar">ðŸŽ’ Escolar</option>
                <option value="RegulaciÃ³n Emocional">ðŸŒ¬ï¸ RegulaciÃ³n</option>
                <option value="Actividades Sociales">ðŸ¤ Actividades Sociales</option>
              </select>
            </div>
            <!-- Skill grid -->
            <div id="skill-grid" class="row g-2" style="max-height:70vh;overflow-y:auto;padding-right:.25rem;"></div>
          </div>
        </div>

        <!-- RIGHT: Skill detail / editor (overlay on mobile/tablet, column on desktop) -->
        <div class="col-lg-7 fade-in-up delay-2">
          <div id="skill-detail" class="np-card p-4"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="shared.js"></script>
<script>
const CAT_COLORS = {
  'Vida Diaria':'var(--np-pink)','Rutina Escolar':'var(--np-blue)',
  'RegulaciÃ³n Emocional':'var(--np-purple)','Actividades Sociales':'var(--np-green)',
};
let currentSkillKey   = null;
let currentCategory   = 'all';
let editorMode        = 'view'; // 'view' | 'edit'

document.addEventListener('DOMContentLoaded', () => {
  NP_initSystem();
  if (!NP_checkSession()) return;
  NP_applyTheme();
  NP_updateHeader();
  renderSkillGrid();
  // Select first skill by default
  const keys = Object.keys(NP_getRoutines());
  if (keys.length) {
    currentSkillKey = keys[0];
    editorMode = 'view';
    renderSkillDetail();
  }
});

function filterCategory(cat) {
  currentCategory = cat;
  const select = document.getElementById('category-filter');
  if (select) select.value = cat;
  renderSkillGrid();
}

function filterSkills() { renderSkillGrid(); }

function renderSkillGrid() {
  const grid    = document.getElementById('skill-grid');
  const routines= NP_getRoutines();
  const active  = NP_getActive();
  const search  = document.getElementById('search-skill').value.toLowerCase();
  grid.innerHTML = '';
  let count = 0;
  Object.keys(routines).forEach(key => {
    const r = routines[key];
    if (currentCategory!=='all' && r.category!==currentCategory) return;
    if (search && !r.name.toLowerCase().includes(search)) return;
    count++;
    const pct       = NP_calcIndependence(key).percentage;
    const isActive  = active[key]===true;
    const isSelected= key===currentSkillKey;
    const catColor  = CAT_COLORS[r.category]||'var(--np-pink)';
    const card = document.createElement('div');
    card.className = 'col-12';
    card.innerHTML = `
      <div class="skill-card ${isSelected?'selected':''}" onclick="selectSkill('${key}')" id="skill-card-${key}">
        <div class="d-flex align-items-center gap-3">
          <div class="sk-icon" style="background:${catColor}18;">${r.icon}</div>
          <div class="flex-grow-1 min-width-0">
            <div class="sk-name">${r.name}</div>
            <div class="sk-cat">${r.category}</div>
            <div class="sk-steps">${pct}% independencia</div>
          </div>
          <div class="d-flex flex-column align-items-end gap-1">
            <span style="font-size:.65rem;font-weight:700;padding:.2rem .65rem;border-radius:999px;background:var(--np-blue-soft);color:var(--np-blue);">
              <i class="fas fa-stairs me-1"></i>${r.steps.length} pasos
            </span>
          </div>
        </div>
      </div>`;
    grid.appendChild(card);
  });
  if (!count) {
    grid.innerHTML = `<div class="col-12 text-center py-5" style="color:var(--np-text-muted);">
      <i class="fas fa-face-sad-tear mb-2 d-block" style="font-size:1.5rem;"></i>No se encontraron actividades.
    </div>`;
  }
}

function isMobileView() {
  return window.innerWidth <= 991;
}

function selectSkill(key) {
  currentSkillKey = key;
  editorMode = 'view';
  renderSkillGrid();
  if (isMobileView()) {
    openMobileOverlay();
  } else {
    renderSkillDetail();
  }
}

function openMobileOverlay() {
  const overlay = document.getElementById('skill-overlay');
  renderSkillDetailInto(overlay);
  overlay.classList.add('open');
  document.body.classList.add('skill-modal-open');
  overlay.scrollTop = 0;
}

function closeMobileDetail() {
  const overlay = document.getElementById('skill-overlay');
  if (overlay) {
    overlay.classList.remove('open');
    document.body.classList.remove('skill-modal-open');
  }
}

function renderSkillDetail() {
  renderSkillDetailInto(document.getElementById('skill-detail'));
}

function renderSkillDetailInto(container) {
  if (!container) return;
  const routines= NP_getRoutines();
  const active  = NP_getActive();
  const r       = routines[currentSkillKey];
  if (!r) { container.innerHTML = `<div class="text-center py-5" style="color:var(--np-text-muted);">Selecciona una actividad de la lista.</div>`; return; }

  const isActive = active[currentSkillKey]===true;
  const pct      = NP_calcIndependence(currentSkillKey).percentage;
  const catColor = CAT_COLORS[r.category]||'var(--np-pink)';
  const isDefault= !!NP_DEFAULT_ROUTINES[currentSkillKey];

  if (editorMode === 'view') {
    container.innerHTML = `
      <div class="d-flex justify-content-between align-items-center mb-4 pb-2" style="border-bottom:1px solid var(--np-border);">
        <button onclick="closeMobileDetail()" class="btn btn-sm fw-bold px-3 py-2 d-lg-none" style="border-radius:10px;background:var(--np-bg);border:1px solid var(--np-border);color:var(--np-text);font-size:.78rem;">
          <i class="fas fa-arrow-left me-1"></i> Volver a la lista
        </button>
        <span class="fw-bold d-lg-none" style="font-size:.82rem;color:var(--np-text-muted);">Detalle de Actividad</span>
      </div>
      <div class="d-flex flex-column flex-lg-row align-items-start gap-3 mb-4 pb-4" style="border-bottom:1px solid var(--np-border);">
        <div style="width:56px;height:56px;border-radius:16px;background:${catColor}18;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;">${r.icon}</div>
        <div class="flex-grow-1" style="min-width:0;">
          <h3 style="font-size:1.1rem;font-weight:900;margin-bottom:.3rem;">${r.name}</h3>
          <span style="font-size:.72rem;font-weight:700;background:${catColor}18;color:${catColor};border-radius:999px;padding:.25rem .75rem;display:inline-block;margin-bottom:.4rem;">${r.category}</span>
          <p style="font-size:.8rem;color:var(--np-text-muted);margin-bottom:.75rem;">${r.description}</p>
          <div class="d-flex gap-2 flex-wrap">
            <button class="btn btn-sm fw-bold" onclick="editorMode='edit';refreshActiveContainer();" style="border-radius:10px;background:rgba(59,130,246,.1);color:var(--np-blue);border:none;font-size:.75rem;">
              <i class="fas fa-pen me-1"></i>Editar
            </button>
            ${isDefault?`<button class="btn btn-sm fw-bold" onclick="restoreDefault()" style="border-radius:10px;background:rgba(244,63,94,.07);color:var(--np-pink);border:none;font-size:.72rem;"><i class="fas fa-rotate-left me-1"></i>Restaurar</button>`:''}
          </div>
        </div>
      </div>
      <div class="d-flex align-items-center gap-4 mb-4 p-3" style="background:var(--np-bg);border-radius:14px;">
        <div style="text-align:center;flex-shrink:0;">
          <div style="font-size:1.6rem;font-weight:900;color:${catColor};">${pct}%</div>
          <div style="font-size:.65rem;color:var(--np-text-muted);text-transform:uppercase;letter-spacing:.05em;">Independencia</div>
        </div>
        <div class="flex-grow-1">
          <div style="background:rgba(0,0,0,.06);border-radius:999px;height:10px;overflow:hidden;">
            <div style="width:${pct}%;background:${catColor};height:100%;border-radius:999px;transition:width .6s ease;"></div>
          </div>
          <div class="d-flex justify-content-between mt-1" style="font-size:.65rem;color:var(--np-text-muted);">
            <span>0%</span><span>50%</span><span>100%</span>
          </div>

      </div>

            <div style="width:28px;height:28px;border-radius:999px;background:${catColor};color:#fff;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;flex-shrink:0;">${i+1}</div>
            <span style="font-size:1.3rem;">${s.icon}</span>
            <div>
              <div style="font-size:.82rem;font-weight:700;">${s.text}</div>
              <div style="font-size:.72rem;color:var(--np-text-muted);">${s.description}</div>
            </div>
          </div>`).join('')}
      </div>`;
  } else {
    container.innerHTML = `
      <div class="d-flex justify-content-between align-items-center mb-4 pb-2" style="border-bottom:1px solid var(--np-border);">
        <button onclick="closeMobileDetail()" class="btn btn-sm fw-bold px-3 py-2 d-lg-none" style="border-radius:10px;background:var(--np-bg);border:1px solid var(--np-border);color:var(--np-text);font-size:.78rem;">
          <i class="fas fa-arrow-left me-1"></i> Volver a la lista
        </button>
        <span class="fw-bold d-lg-none" style="font-size:.82rem;color:var(--np-text-muted);">Editar Actividad</span>
      </div>
      <div class="d-flex align-items-center justify-content-between mb-4 pb-3" style="border-bottom:1px solid var(--np-border);">
        <div style="font-size:.8rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--np-text-muted);">
          <i class="fas fa-pen-to-square me-1" style="color:var(--np-pink);"></i> Modo EdiciÃ³n
        </div>
        <button onclick="editorMode='view';refreshActiveContainer();" class="btn btn-sm" style="border-radius:10px;background:var(--np-bg);border:1px solid var(--np-border);font-size:.75rem;">
          <i class="fas fa-arrow-left me-1"></i> Ver
        </button>
      </div>
      <div class="row g-3 mb-4">
        <div class="col-8">
          <label class="np-label">Nombre de Actividad</label>
          <input class="np-input" type="text" id="ed-name" value="${r.name}" oninput="liveUpdateField('name',this.value)" />
        </div>
        <div class="col-4">
          <label class="np-label">Emoji / Icono</label>
          <input class="np-input" type="text" id="ed-icon" value="${r.icon}" style="text-align:center;font-size:1.2rem;" oninput="liveUpdateField('icon',this.value)" />
        </div>
        <div class="col-6">
          <label class="np-label">CategorÃ­a</label>
          <select class="np-input" id="ed-cat" onchange="liveUpdateField('category',this.value)">
            <option value="Vida Diaria" ${r.category==='Vida Diaria'?'selected':''}>ðŸ§¼ Vida Diaria</option>
            <option value="Rutina Escolar" ${r.category==='Rutina Escolar'?'selected':''}>ðŸŽ’ Escolar</option>
            <option value="RegulaciÃ³n Emocional" ${r.category==='RegulaciÃ³n Emocional'?'selected':''}>ðŸŒ¬ï¸ RegulaciÃ³n</option>
            <option value="Actividades Sociales" ${r.category==='Actividades Sociales'?'selected':''}>ðŸ¤ Actividades Sociales</option>
          </select>
        </div>
        <div class="col-6">
          <label class="np-label">DescripciÃ³n breve</label>
          <input class="np-input" type="text" id="ed-desc" value="${r.description||''}" oninput="liveUpdateField('description',this.value)" />
        </div>
      </div>
      <div class="d-flex align-items-center justify-content-between mb-3">
        <div style="font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--np-text-muted);">
          <i class="fas fa-list-ol me-1" style="color:var(--np-pink);"></i> Pasos (${r.steps.length})
        </div>
        <button onclick="addStep()" class="btn btn-sm fw-bold" style="border-radius:10px;background:rgba(16,185,129,.1);color:var(--np-green);border:none;font-size:.72rem;">
          <i class="fas fa-plus me-1"></i> Agregar paso
        </button>
      </div>
      <div id="steps-editor" class="d-flex flex-column gap-2 mb-4">
        ${r.steps.map((s,i)=>`
          <div class="step-editor-card" id="step-ed-${s.id}">
            <div class="d-flex align-items-center gap-2 mb-2">
              <div class="step-number">${i+1}</div>
              <div class="d-flex gap-1 ms-auto">
                <button onclick="moveStep(${s.id},'up')" ${i===0?'disabled':''} class="btn btn-sm" style="border-radius:8px;background:var(--np-card);border:1px solid var(--np-border);font-size:.7rem;padding:.2rem .5rem;"><i class="fas fa-arrow-up"></i></button>
                <button onclick="moveStep(${s.id},'down')" ${i===r.steps.length-1?'disabled':''} class="btn btn-sm" style="border-radius:8px;background:var(--np-card);border:1px solid var(--np-border);font-size:.7rem;padding:.2rem .5rem;"><i class="fas fa-arrow-down"></i></button>
                <button onclick="deleteStep(${s.id})" class="btn btn-sm" style="border-radius:8px;background:rgba(244,63,94,.1);color:var(--np-pink);border:none;font-size:.7rem;padding:.2rem .5rem;"><i class="fas fa-trash"></i></button>
              </div>
            </div>
            <div class="row g-2">
              <div class="col-2">
                <input class="np-input" type="text" value="${s.icon||''}" placeholder="ðŸŒŸ" style="text-align:center;font-size:1.1rem;padding:.4rem;" oninput="updateStep(${s.id},'icon',this.value)" />
              </div>
              <div class="col-10">
                <input class="np-input" type="text" value="${s.text||''}" placeholder="Nombre del paso" style="padding:.4rem .8rem;" oninput="updateStep(${s.id},'text',this.value)" />

              <div class="col-12">
                <textarea class="np-input" rows="2" placeholder="DescripciÃ³n clara para el alumnoâ€¦" style="resize:none;font-size:.78rem;" oninput="updateStep(${s.id},'description',this.value)">${s.description||''}</textarea>

/* Refreshes whichever container is currently active (overlay on mobile, grid panel on desktop) */
function refreshActiveContainer() {
  const overlay = document.getElementById('skill-overlay');
  if (overlay && overlay.classList.contains('open')) {
    renderSkillDetailInto(overlay);
    overlay.scrollTop = 0;
  } else {
    renderSkillDetail();
  }
}

function toggleActive(val) {
  const active = NP_getActive();
  active[currentSkillKey] = val;
  NP_setActive(active);
  renderSkillGrid();
  refreshActiveContainer();
  NP_showToast(val ? 'Actividad activada para el alumno.' : 'Actividad ocultada del tablero.', val?'success':'info');
}

function liveUpdateField(field, value) {
  const routines = NP_getRoutines();
  if (!routines[currentSkillKey]) return;
  routines[currentSkillKey][field] = value;
  NP_setRoutines(routines);
  renderSkillGrid();
}

function updateStep(stepId, field, value) {
  const routines = NP_getRoutines();
  const step = routines[currentSkillKey].steps.find(s=>s.id===stepId);
  if (step) { step[field]=value; NP_setRoutines(routines); }
}

function moveStep(stepId, dir) {
  const routines = NP_getRoutines();
  const steps = routines[currentSkillKey].steps;
  const idx = steps.findIndex(s=>s.id===stepId);
  const newIdx = dir==='up'?idx-1:idx+1;
  if (newIdx<0||newIdx>=steps.length) return;
  [steps[idx],steps[newIdx]]=[steps[newIdx],steps[idx]];
  steps.forEach((s,i)=>s.id=i+1);
  NP_setRoutines(routines);
  refreshActiveContainer();
  NP_showToast('Paso reordenado.','info');
}

function deleteStep(stepId) {
  const routines = NP_getRoutines();
  const steps = routines[currentSkillKey].steps;
  if (steps.length<=1) { NP_showToast('Debe haber al menos 1 paso.','error'); return; }
  routines[currentSkillKey].steps = steps.filter(s=>s.id!==stepId);
  routines[currentSkillKey].steps.forEach((s,i)=>s.id=i+1);
  NP_setRoutines(routines);
  refreshActiveContainer();
  NP_showToast('Paso eliminado.','info');
}

function addStep() {
  const routines = NP_getRoutines();
  const steps = routines[currentSkillKey].steps;
  steps.push({ id:steps.length+1, text:'Nuevo Paso', icon:'✨', description:'Describe la acción de este paso.' });
  NP_setRoutines(routines);
  refreshActiveContainer();
}

function saveEdits() {
  NP_showToast('Cambios guardados automáticamente.','success');
  editorMode='view';
  renderSkillGrid();
  refreshActiveContainer();
}

function restoreDefault() {
  if (!NP_DEFAULT_ROUTINES[currentSkillKey]) { NP_showToast('Esta actividad fue creada por ti.','info'); return; }
  const routines = NP_getRoutines();
  routines[currentSkillKey] = JSON.parse(JSON.stringify(NP_DEFAULT_ROUTINES[currentSkillKey]));
  NP_setRoutines(routines);
  editorMode='view';
  renderSkillGrid();
  refreshActiveContainer();
  NP_showToast('Actividad restaurada a valores clínicos.','success');
}

function deleteSkill() {
  if (NP_DEFAULT_ROUTINES[currentSkillKey]) { NP_showToast('No puedes eliminar actividades clínicas predeterminadas.','error'); return; }
  const routines = NP_getRoutines();
  delete routines[currentSkillKey];
  NP_setRoutines(routines);
  const keys = Object.keys(NP_getRoutines());
  currentSkillKey = keys[0] || null;
  editorMode='view';
  closeMobileDetail();
  renderSkillGrid();
  if (currentSkillKey) {
    renderSkillDetail();
  } else {
    document.getElementById('skill-detail').innerHTML='';
  }
  NP_showToast('Actividad eliminada.','info');
}

function createNewSkill() {
  const routines = NP_getRoutines();
  const active   = NP_getActive();
  const id = 'custom_' + Date.now();
  routines[id] = { name:'Nueva Actividad', category:'Vida Diaria', icon:'🌟', colorClass:'gradient-pink', baselineAutonomy:0, description:'Descripción de la actividad.', steps:[{id:1,text:'Primer Paso',icon:'🌟',description:'Describe el primer paso de la secuencia.'}] };
  active[id] = true;
  NP_setRoutines(routines);
  NP_setActive(active);
  currentSkillKey=id; editorMode='edit';
  renderSkillGrid();
  if (isMobileView()) {
    openMobileOverlay();
  } else {
    renderSkillDetail();
  }
  NP_showToast('¡Nueva actividad creada! Edítala ahora.','success');
}
</script>
<!-- Mobile full-screen overlay: direct body child so position:fixed is never broken by parent stacking contexts -->
<div id="skill-overlay" class="np-card"></div>
